workflows:
  android-workflow:
    name: TraderMind MC Android Build
    max_build_duration: 60
    environment:
      java: 17
    scripts:
      - name: Setup Gradle
        script: |
          gradle wrapper
      - name: Build Android APK
        script: |
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/apk/debug/app-debug.apk
